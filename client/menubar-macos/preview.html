<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Folklore Activity Island</title>
  <link rel="icon" href="../../site/assets/folklore-favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=Geist+Mono:wght@400..600&display=swap" rel="stylesheet">
  <style>
    /* Design reference for the AppKit island. Palette and type mirror
       site/assets/site.css so the two can be compared side by side.
       One honest divergence: this page pulls Fraunces + Geist Mono from the
       site's CDN, while the app falls back to New York + SF Mono unless the
       user happens to have them installed — see BrandFont in
       activity-island.swift. Shapes, colour and motion are otherwise 1:1. */
    :root {
      color-scheme: dark;
      font-family: 'Fraunces', ui-serif, 'New York', Georgia, serif;
      background: #14100d;
      color: #f4ecd8;
      --sensor-width: 176px;
      --compact-width: 340px;
      --compact-height: 36px;
      --expanded-width: 404px;
      --expanded-height: 124px;
      --accent: #1fae8b;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { background: #14100d; }

    .wallpaper {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .46;
      filter: saturate(.58) contrast(1.06) brightness(.72);
    }

    .shade { position: fixed; inset: 0; background: rgba(12, 17, 15, .32); }

    .menubar {
      position: fixed;
      inset: 0 0 auto;
      height: var(--compact-height);
      background: rgba(20, 25, 23, .7);
      border-bottom: 1px solid rgba(244, 236, 216, .07);
      backdrop-filter: blur(22px) saturate(.8);
    }

    .menubar-brand,
    .menubar-time {
      position: absolute;
      top: 0;
      height: var(--compact-height);
      display: flex;
      align-items: center;
      color: rgba(244, 236, 216, .86);
      font-size: 12px;
      font-weight: 600;
    }

    .menubar-brand { left: 17px; gap: 7px; }
    .menubar-brand img { width: 18px; height: 18px; }
    .menubar-time { right: 18px; font-variant-numeric: tabular-nums; }

    .island {
      position: fixed;
      z-index: 5;
      top: 0;
      left: 50%;
      width: var(--compact-width);
      height: var(--compact-height);
      overflow: hidden;
      transform: translateX(-50%);
      /* Same recipe as `.term` on the site: warm charcoal, never #000, lit by a
         yellow wash off the top-right and a pink one off the bottom-left. */
      border: 1px solid rgba(244, 236, 216, .07);
      border-top: 0;
      border-radius: 0 0 14px 14px;
      background:
        radial-gradient(90% 60% at 78% -5%, rgba(245, 185, 33, .07), transparent 60%),
        radial-gradient(80% 70% at 10% 108%, rgba(255, 79, 109, .06), transparent 60%),
        #171310;
      box-shadow: 0 14px 34px rgba(0, 0, 0, .22);
      cursor: default;
      transition:
        width 360ms cubic-bezier(.16, .84, .2, 1.08),
        height 360ms cubic-bezier(.16, .84, .2, 1.06),
        border-radius 360ms cubic-bezier(.16, .84, .2, 1.06);
      will-change: width, height;
    }

    .island.expanded {
      width: var(--expanded-width);
      height: var(--expanded-height);
      border-radius: 0 0 22px 22px;
    }

    .sensor {
      position: fixed;
      z-index: 7;
      top: 0;
      left: 50%;
      width: var(--sensor-width);
      height: var(--compact-height);
      transform: translateX(-50%);
      border-radius: 0 0 12px 12px;
      background: #000;
      pointer-events: none;
    }

    .compact-bar {
      position: absolute;
      inset: 0 0 auto;
      height: var(--compact-height);
      display: grid;
      grid-template-columns: 1fr var(--sensor-width) 1fr;
      align-items: center;
    }

    .compact-leading,
    .compact-trailing {
      min-width: 0;
      height: var(--compact-height);
      display: flex;
      align-items: center;
    }

    .compact-leading { gap: 6px; padding-left: 10px; }
    .compact-trailing { justify-content: flex-end; gap: 7px; padding-right: 10px; }

    .brand-icon {
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      /* No radius: the spark is a transparent flame, not the favicon's ink
         card — that card is what made the mark read as a dark box on a dark
         island. Sway matches `flsway` in site.css; the flame is alive on the
         site, so it stays alive here. */
      transform-origin: 50% 74%;
      animation: flsway 2.3s ease-in-out infinite;
    }

    @keyframes flsway {
      0%, 100% { transform: scaleY(1) skewX(0deg); }
      24% { transform: scaleY(1.06) skewX(-2deg); }
      52% { transform: scaleY(.97) skewX(1.6deg); }
      76% { transform: scaleY(1.04) skewX(-1deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .brand-icon { animation: none; }
    }

    .compact-verb,
    .compact-metric,
    .eyebrow,
    .route,
    .detail {
      /* The site tracks every uppercase mono label at .06em. Without it the
         caps clot and stop reading as the same typographic system. */
      letter-spacing: .06em;
      font-family: 'Geist Mono', ui-monospace, "SFMono-Regular", Menlo, monospace;
      white-space: nowrap;
    }

    .compact-verb {
      overflow: hidden;
      color: #f4ecd8;
      font-size: 9px;
      font-weight: 750;
      text-overflow: clip;
    }

    .compact-metric {
      overflow: hidden;
      color: #c9bda1;
      font-size: 10px;
      font-weight: 650;
      text-overflow: clip;
    }

    .status-dot {
      flex: 0 0 auto;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    .island.event .compact-verb { color: var(--accent); }
    .island.pulse .compact-leading,
    .island.pulse .compact-trailing { animation: compact-pulse 430ms cubic-bezier(.2, .82, .2, 1); }

    .expanded-body {
      position: absolute;
      inset: calc(var(--compact-height) + 11px) 18px 0;
      opacity: 0;
      transform: translateY(-5px) scale(.985);
      transform-origin: 50% 0;
      transition:
        opacity 170ms ease 65ms,
        transform 300ms cubic-bezier(.18, .82, .2, 1.05) 35ms;
    }

    .expanded .expanded-body { opacity: 1; transform: translateY(0) scale(1); }

    .eyebrow {
      height: 13px;
      overflow: hidden;
      color: var(--accent);
      font-size: 9px;
      font-weight: 750;
      line-height: 13px;
      text-overflow: ellipsis;
    }

    .title {
      height: 23px;
      margin-top: 3px;
      overflow: hidden;
      color: #f4ecd8;
      /* The one serif on the surface. folklore is an editorial brand — the site
         headline is Fraunces — so the node title carries that voice while every
         label around it stays mono. */
      font-family: 'Fraunces', ui-serif, 'New York', Georgia, serif;
      font-variation-settings: 'opsz' 144;
      font-size: 16px;
      font-weight: 650;
      letter-spacing: -.01em;
      line-height: 23px;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .route-row {
      height: 15px;
      margin-top: 6px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
    }

    .route,
    .detail {
      overflow: hidden;
      color: #8a7c62;
      font-size: 10px;
      font-weight: 550;
      line-height: 15px;
      text-overflow: ellipsis;
    }

    .detail { color: #c9bda1; font-weight: 650; text-align: right; }

    .signal {
      position: absolute;
      right: 2px;
      bottom: 7px;
      left: 2px;
      height: 4px;
    }

    .signal::before,
    .signal::after {
      content: "";
      position: absolute;
      z-index: 2;
      top: 0;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    .signal::before { left: -2px; }
    .signal::after { right: -2px; }

    .signal-line {
      position: absolute;
      top: 1px;
      right: 0;
      left: 0;
      height: 2px;
      border-radius: 1px;
      background: rgba(244, 236, 216, .14);
      overflow: hidden;
    }

    .signal-line::after {
      content: "";
      display: block;
      width: 100%;
      height: 100%;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: 0 50%;
    }

    .expanded .signal-line::after { animation: route-complete 520ms cubic-bezier(.2, .8, .2, 1) 90ms forwards; }

    .controls {
      position: fixed;
      z-index: 4;
      left: 50%;
      bottom: 28px;
      display: flex;
      gap: 7px;
      transform: translateX(-50%);
    }

    button {
      min-width: 82px;
      height: 36px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 1px solid rgba(244, 236, 216, .16);
      border-radius: 7px;
      background: rgba(8, 9, 8, .82);
      color: #f4ecd8;
      font: 600 12px/1 -apple-system, BlinkMacSystemFont, sans-serif;
      cursor: pointer;
      backdrop-filter: blur(14px);
    }

    button:hover { border-color: rgba(244, 236, 216, .4); background: #090a09; }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .button-icon { width: 14px; font: 700 15px/1 ui-monospace, monospace; }

    @keyframes compact-pulse {
      0% { transform: scale(.9); opacity: .45; }
      62% { transform: scale(1.035); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes route-complete {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    @media (max-width: 560px) {
      :root {
        --sensor-width: 128px;
        --compact-width: 292px;
        --expanded-width: min(374px, calc(100vw - 20px));
      }
      .menubar-brand span { display: none; }
      .controls { bottom: 18px; }
      button { min-width: 72px; padding: 0 9px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .island, .expanded-body { transition: none; }
      .island.pulse .compact-leading,
      .island.pulse .compact-trailing,
      .expanded .signal-line::after { animation: none; transform: none; }
    }
  </style>
</head>
<body>
  <video class="wallpaper" autoplay muted loop playsinline src="../../site/assets/gen/campfire.mp4"></video>
  <div class="shade"></div>
  <div class="menubar">
    <div class="menubar-brand">
      <img src="../../site/assets/folklore-navbar.svg" alt="">
      <span>folklore</span>
    </div>
    <div class="menubar-time" id="clock"></div>
  </div>

  <section class="island" id="island" aria-live="polite" aria-label="Folklore peer activity">
    <div class="compact-bar">
      <div class="compact-leading">
        <img class="brand-icon" src="../../site/assets/folklore-spark.svg" alt="">
        <span class="compact-verb" id="compactVerb">ONLINE</span>
      </div>
      <div aria-hidden="true"></div>
      <div class="compact-trailing">
        <span class="compact-metric" id="compactMetric">3 PEERS</span>
        <span class="status-dot"></span>
      </div>
    </div>

    <div class="expanded-body">
      <div class="eyebrow" id="eyebrow"></div>
      <div class="title" id="title"></div>
      <div class="route-row">
        <div class="route" id="route"></div>
        <div class="detail" id="detail"></div>
      </div>
      <div class="signal" aria-hidden="true"><div class="signal-line"></div></div>
    </div>
  </section>
  <div class="sensor" aria-hidden="true"></div>

  <div class="controls" aria-label="Preview an activity">
    <button type="button" data-event="pull"><span class="button-icon">↓</span><span>Pull</span></button>
    <button type="button" data-event="serve"><span class="button-icon">↑</span><span>Share</span></button>
    <button type="button" data-event="search"><span class="button-icon">⌕</span><span>Match</span></button>
  </div>

  <script>
    const island = document.querySelector('#island');
    const compactVerb = document.querySelector('#compactVerb');
    const compactMetric = document.querySelector('#compactMetric');
    const eyebrow = document.querySelector('#eyebrow');
    const title = document.querySelector('#title');
    const route = document.querySelector('#route');
    const detail = document.querySelector('#detail');
    const clock = document.querySelector('#clock');

    const states = {
      pull: {
        verb: 'PULL',
        metric: '+638 TOK',
        eyebrow: 'TRACE RECEIVED  ·  @PEER-LAB',
        title: 'Peer traces compound knowledge',
        route: '@peer-lab  →  YOUR GRAPH',
        detail: '2 NODES  ·  638 TOK',
        accent: '#1fae8b'
      },
      serve: {
        verb: 'SHARE',
        metric: '2 NODES',
        eyebrow: 'TRACE SHARED  ·  @PEER-LAB',
        title: 'Cross-encoder admission result',
        route: 'YOUR GRAPH  →  @peer-lab',
        detail: 'REP +1',
        accent: '#ff4f6d'
      },
      search: {
        verb: 'MATCH',
        metric: '5 HITS',
        eyebrow: 'LOCAL MATCH  ·  @PEER-LAB',
        title: 'Streamed inference trace',
        route: 'YOUR GRAPH  →  @peer-lab',
        detail: 'NO MODEL CALL',
        accent: '#f5b921'
      }
    };

    let latestType = 'pull';
    let closeTimer;
    let phaseTimer;
    let autoTimer;
    let isHovering = false;
    let sequence = 0;

    function clearSchedule() {
      clearTimeout(closeTimer);
      clearTimeout(phaseTimer);
    }

    function apply(type) {
      const state = states[type];
      if (!state) return;
      latestType = type;
      island.style.setProperty('--accent', state.accent);
      document.documentElement.style.setProperty('--accent', state.accent);
      compactVerb.textContent = state.verb;
      compactMetric.textContent = state.metric;
      eyebrow.textContent = state.eyebrow;
      title.textContent = state.title;
      route.textContent = state.route;
      detail.textContent = state.detail;
    }

    function pulse() {
      island.classList.remove('pulse');
      void island.offsetWidth;
      island.classList.add('pulse');
    }

    function expand(type = latestType, automatic = false) {
      clearSchedule();
      sequence += 1;
      const run = sequence;
      apply(type);
      island.classList.add('event');
      pulse();
      phaseTimer = setTimeout(() => {
        if (run !== sequence) return;
        island.classList.add('expanded');
        if (automatic && !isHovering) closeTimer = setTimeout(collapse, 3700);
      }, 280);
    }

    function collapse() {
      clearSchedule();
      sequence += 1;
      island.classList.remove('expanded');
      closeTimer = setTimeout(() => {
        if (isHovering || island.classList.contains('expanded')) return;
        island.classList.remove('event', 'pulse');
        compactVerb.textContent = 'ONLINE';
        compactMetric.textContent = '3 PEERS';
        island.style.setProperty('--accent', '#1fae8b');
        document.documentElement.style.setProperty('--accent', '#1fae8b');
      }, 430);
    }

    function run(type) { expand(type, true); }

    document.querySelectorAll('[data-event]').forEach((button) => {
      button.addEventListener('click', () => run(button.dataset.event));
    });

    island.addEventListener('mouseenter', () => {
      isHovering = true;
      expand(latestType, false);
    });

    island.addEventListener('mouseleave', () => {
      isHovering = false;
      closeTimer = setTimeout(collapse, 360);
    });

    island.addEventListener('click', () => {
      if (island.classList.contains('expanded')) collapse();
      else expand(latestType, false);
    });

    function updateClock() {
      clock.textContent = new Intl.DateTimeFormat('en', {
        weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      }).format(new Date());
    }

    updateClock();
    setInterval(updateClock, 30000);

    const requested = new URLSearchParams(location.search).get('event');
    if (states[requested]) latestType = requested;
    else if (requested === 'idle') latestType = 'pull';
    else run('pull');

    const order = ['pull', 'serve', 'search'];
    let autoIndex = Math.max(order.indexOf(latestType), 0);
    autoTimer = setInterval(() => {
      if (isHovering) return;
      autoIndex = (autoIndex + 1) % order.length;
      run(order[autoIndex]);
    }, 6500);
  </script>
</body>
</html>
