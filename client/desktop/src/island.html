<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Folklore Activity</title>
<style>
  :root{
    --paper:#f4ecd8; --paper-muted:#b8ad97; --paper-dim:#7c7062;
    --surface:#050505; --pink:#ff4f6d; --yellow:#f5b921; --teal:#1fae8b;
    --accent:var(--teal);
    --sans:-apple-system,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:transparent;overflow:hidden;height:100%}
  body{font-family:var(--sans);-webkit-font-smoothing:antialiased;user-select:none;cursor:default}
  /* The island: near-black to read as the notch/bezel, flush at the top. */
  .isl{position:fixed;top:0;left:50%;transform:translateX(-50%);
    width:440px;min-height:0;border-radius:0 0 24px 24px;background:var(--surface);
    box-shadow:0 22px 46px -18px rgba(0,0,0,.75);overflow:hidden;
    display:flex;align-items:center;gap:14px;padding:14px 18px 16px}
  .tile{width:42px;height:42px;flex:none;border-radius:13px;display:grid;place-items:center;
    background:color-mix(in srgb, var(--accent) 12%, #100d0a);
    border:1px solid color-mix(in srgb, var(--accent) 26%, transparent)}
  .tile img{width:29px;height:29px}
  .txt{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
  .verb{font-size:11px;font-weight:600;letter-spacing:.02em;color:var(--accent)}
  .hl{font-size:15px;font-weight:600;letter-spacing:-.014em;color:var(--paper);line-height:1.2;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .peer{font-size:12px;font-weight:450;color:var(--paper-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .peer b{color:var(--paper);font-weight:600}
  .metric{flex:none;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
  .metric b{font-size:16px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
  .metric i{font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--paper-dim);font-style:normal}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex:none;align-self:center}
</style>
</head>
<body>
  <div class="isl" id="isl" style="--accent:var(--teal)">
    <div class="tile"><img src="folklore-mark.svg" alt=""></div>
    <div class="txt">
      <span class="verb" id="verb">Online</span>
      <span class="hl" id="hl">folklore</span>
      <span class="peer" id="peer">no recent peer activity</span>
    </div>
    <div class="metric" id="metric"><span class="dot"></span></div>
  </div>

<script type="module">
  const invoke = window.__TAURI__.core.invoke;
  const isl = document.getElementById('isl');
  const verbEl = document.getElementById('verb');
  const hlEl = document.getElementById('hl');
  const peerEl = document.getElementById('peer');
  const metricEl = document.getElementById('metric');

  // Click the island to dismiss it.
  document.body.addEventListener('click', () => {
    invoke('recent_activity', { n: 0 }).catch(()=>{});
    window.__TAURI__.window.getCurrentWindow().hide().catch(()=>{});
  });

  const ACCENT = { pull:'#1fae8b', serve:'#ff4f6d', search:'#f5b921' };

  function humanPeer(p){
    if(!p) return 'a peer';
    if(p.length <= 14) return p;
    // deterministic short tag, matching the CLI's peer-XXXX style spirit
    let h = 5381; for(const c of p) h = ((h*33) ^ c.charCodeAt(0)) >>> 0;
    return 'peer-' + h.toString(36).slice(0,4);
  }
  function readableNode(id){
    if(!id) return 'Reusable trace';
    const tail = String(id).split('/').filter(Boolean).pop() || id;
    const words = decodeURIComponent(tail).replace(/[-_]+/g,' ').trim();
    if(!words) return 'Reusable trace';
    return words.charAt(0).toUpperCase()+words.slice(1);
  }

  function render(ev){
    if(!ev){
      isl.style.setProperty('--accent','var(--teal)');
      verbEl.textContent='Online'; verbEl.style.color='var(--paper)';
      hlEl.textContent='folklore';
      peerEl.textContent='no recent peer activity';
      metricEl.innerHTML='<span class="dot"></span>';
      return;
    }
    const dir = ev.direction === 'pull' ? 'pull' : (ev.kind === 'fetch' ? 'serve' : 'search');
    const accent = ACCENT[dir];
    isl.style.setProperty('--accent', accent);
    verbEl.style.color = accent;
    const who = humanPeer(ev.peer);
    const tokens = ev.payload_tokens_estimate || 0;
    const nodes = ev.count || (ev.nodes ? ev.nodes.length : 1);
    if(dir==='pull'){
      verbEl.textContent='Received';
      peerEl.innerHTML='<b>'+who+'</b> · sent you '+nodes+' node'+(nodes===1?'':'s');
      metricEl.innerHTML = tokens>0
        ? '<b>+'+tokens+'</b><i>tokens</i>'
        : '<b>+'+nodes+'</b><i>node'+(nodes===1?'':'s')+'</i>';
    } else if(dir==='serve'){
      verbEl.textContent='Shared';
      peerEl.innerHTML='<b>'+who+'</b> · pulled from your graph';
      metricEl.innerHTML='<b>+1</b><i>rep</i>';
    } else {
      verbEl.textContent='Matched';
      peerEl.innerHTML='<b>'+who+'</b> · matched '+nodes+' locally';
      metricEl.innerHTML='<b>'+nodes+'</b><i>hit'+(nodes===1?'':'s')+'</i>';
    }
    hlEl.textContent = readableNode(ev.nodes && ev.nodes[0]);
  }

  async function poll(){
    try{
      const lines = await invoke('recent_activity', { n: 8 });
      let latest = null;
      for(const line of (lines||[])){
        try{
          const ev = JSON.parse(line);
          if(ev && (ev.direction==='pull' || ev.direction==='serve')) latest = ev;
        }catch{}
      }
      render(latest);
    }catch(e){ /* daemon not up yet */ }
  }
  poll();
  setInterval(poll, 1500);
</script>
</body>
</html>
