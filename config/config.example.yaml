# folklore — example configuration.
# Copy to ~/.folklore/config.yaml and fill in secrets.
# Never commit real bot tokens or chat ids.

daemon:
  interval_seconds: 86400        # 1 day default
  max_parallel_sources: 8
  discovery_cadence: 5           # every Nth iteration runs discovery mode
  round_robin_sources: true      # rotate through sources one per iteration vs. all-at-once

embeddings:
  model: Xenova/all-MiniLM-L6-v2
  dim: 384
  cache_dir: ~/.folklore/models

graph:
  # forked graphify sidecar — Phase 1
  path: ~/.folklore/graph
  python_venv: ~/.folklore/.venv
  schema_version: 1

vectors:
  path: ~/.folklore/vectors.db

tunnels:
  enabled: true
  min_cluster_size: 3            # need ≥3 similar nodes to form a tunnel
  similarity_threshold: 0.80

peer:
  # P2P federation. All keys optional — these are the defaults.
  port: 0                        # 0 = OS-assigned. Set a fixed port (e.g. 4001) for WAN reachability.
  listen_host: 127.0.0.1         # set 0.0.0.0 to accept remote peer connections
  mdns: true                     # LAN auto-discovery (multicast). Local network only.
  # Discovery is self-sovereign + decentralized — no central server required:
  #   1. mDNS (above) finds peers on your LAN with zero infra.
  #   2. `folklore peer add <multiaddr>` dials a peer directly (pure P2P).
  #   3. kad-dht (below) on folklore's OWN protocol /folklore/kad/1.0.0 — private
  #      network — seeded by a community bootstrap_peers LIST (multiple seeds,
  #      anyone can run one). Seeds set dht.server: true.
  #   4. dht.public: true — OPT-IN zero-infra WAN discovery via the public IPFS
  #      Amino DHT. No seed of your own to run: the daemon provides + queries a
  #      deterministic folklore rendezvous CID on the global DHT, so fresh nodes
  #      find each other among the IPFS network. Tradeoff: discovery metadata is
  #      public (your data stays signed/private). Off by default.
  dht:
    enabled: true                # folklore's own kad-dht (client mode); on by default
    server: false                # true ONLY on public seed nodes (serve the routing table)
    public: false                # true = join public IPFS Amino DHT + rendezvous (zero-infra WAN, public discovery)
    # WAN seed peers for @libp2p/bootstrap discovery — how a fresh node finds
    # the swarm across the internet (mDNS is LAN-only). Each entry is a full
    # multiaddr including the /p2p/<peerId> tail. Discovered peers are
    # auto-dialled and persisted to peers.json with discovery_method:'bootstrap'.
    #
    # Federation is DEFAULT-ON (FOLKLORE_PREFETCH_PEERS=1). When this list is
    # empty, the loader falls back to the FOLKLORE_BOOTSTRAP_PEERS env var
    # (comma-separated multiaddrs) — set that to the folklore network's public
    # bootstrap node and every install joins automatically, no manual peer add.
    # If neither is set there are simply no peers to reach (local-only in effect).
    bootstrap_peers: []
    # - /ip4/203.0.113.10/tcp/4001/p2p/12D3KooW...
  relays: []                     # circuit-relay-v2 multiaddrs for NAT traversal
  upnp: true                     # UPnP port mapping (no-op on 127.0.0.1)

sources:
  # Phase 3 — shared source registry.
  enabled:
    - arxiv
    - github_trending
    - star_history
    - oss_insight
    - ecosystems_timeline
    - gitstar_ranking
    - hn_algolia
    - papers_with_code
    - generic_rss
  disabled: []
