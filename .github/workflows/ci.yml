name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node 20 is removed from GitHub Actions runners on 2026-09-16
        # and forced to Node 24 default on 2026-06-16. Matrix tracks the
        # supported LTS plus current — drop 20, hold 22 (current LTS),
        # add 24 (next LTS, default-forced).
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: bash scripts/bootstrap.sh
      - run: npm test
