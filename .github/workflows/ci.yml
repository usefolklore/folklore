name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: npm ci
      - run: npm run build
      - run: bash scripts/bootstrap.sh
      - run: npm test
        env:
          # Skip the two libp2p E2E tests (Phase 18 10-peer mesh,
          # Phase 39 oracle gossip) that flake on shared CI runners
          # because of port contention + mDNS sandboxing. Unit +
          # structural + integration-without-network tiers all run.
          # Run locally without this flag to exercise the network path.
          AKASHIK_SKIP_SLOW: "1"
