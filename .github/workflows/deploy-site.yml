name: deploy-site

# Deploys the static marketing site (site/) to the Cloudflare Pages project
# "folklore" — which currently serves a stale "coming soon" placeholder because
# nothing ever pushed site/ to it. Runs on any change under site/ (or manually).
#
# REQUIRED repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — a *fresh* token (the old ones were burned/rotated);
#                            scope: Account → Cloudflare Pages → Edit
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
#
# After the first successful deploy, attach usefolklore.sh as a custom domain to
# the "folklore" Pages project in the Cloudflare dashboard (one-time, dashboard-only).

on:
  push:
    branches: [main]
    paths: ['site/**', '.github/workflows/deploy-site.yml']
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard — secrets present
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — add them as repo secrets, then re-run."
            exit 1
          fi

      - name: "Deploy site/ to Cloudflare Pages (project: folklore)"
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=folklore --branch=main
