name = "folklore"
compatibility_date = "2026-06-15"
pages_build_output_dir = "site"

# Peer tracker (functions/tracker/*) — BitTorrent-style rendezvous, holds peer
# pointers only. Create the namespace once, then paste its id here:
#   npx wrangler kv namespace create TRACKER_KV
[[kv_namespaces]]
binding = "TRACKER_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
