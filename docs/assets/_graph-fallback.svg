<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="wellinformed network — sample 50-node knowledge graph">
  <title>wellinformed knowledge graph — static fallback for §11 live demo on mobile / unreachable backend</title>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="55%" r="58%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="55%" stop-color="#34d399" stop-opacity="0.025"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="peerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="#0c0c14"/>
  <ellipse cx="400" cy="275" rx="320" ry="220" fill="url(#bgGlow)"/>

  <!-- Edges (drawn first, behind nodes) — soft emerald, varied opacity -->
  <g stroke="#34d399" stroke-linecap="round" fill="none">
    <!-- spine + peer-to-peer -->
    <g stroke-width="1.0" opacity="0.32">
      <line x1="180" y1="120" x2="320" y2="180"/>
      <line x1="180" y1="120" x2="120" y2="220"/>
      <line x1="320" y1="180" x2="280" y2="270"/>
      <line x1="320" y1="180" x2="430" y2="160"/>
      <line x1="430" y1="160" x2="540" y2="200"/>
      <line x1="430" y1="160" x2="500" y2="280"/>
      <line x1="540" y1="200" x2="630" y2="160"/>
      <line x1="540" y1="200" x2="610" y2="290"/>
      <line x1="630" y1="160" x2="710" y2="240"/>
      <line x1="120" y1="220" x2="160" y2="320"/>
      <line x1="120" y1="220" x2="220" y2="280"/>
      <line x1="160" y1="320" x2="240" y2="380"/>
      <line x1="220" y1="280" x2="280" y2="270"/>
      <line x1="220" y1="280" x2="340" y2="350"/>
      <line x1="280" y1="270" x2="340" y2="350"/>
      <line x1="280" y1="270" x2="380" y2="280"/>
      <line x1="380" y1="280" x2="500" y2="280"/>
      <line x1="380" y1="280" x2="430" y2="370"/>
      <line x1="500" y1="280" x2="610" y2="290"/>
      <line x1="430" y1="370" x2="540" y2="400"/>
      <line x1="430" y1="370" x2="340" y2="350"/>
      <line x1="540" y1="400" x2="610" y2="290"/>
      <line x1="540" y1="400" x2="660" y2="380"/>
      <line x1="660" y1="380" x2="710" y2="240"/>
      <line x1="240" y1="380" x2="340" y2="350"/>
      <line x1="240" y1="380" x2="320" y2="430"/>
      <line x1="320" y1="430" x2="430" y2="370"/>
      <line x1="320" y1="430" x2="240" y2="380"/>
      <line x1="610" y1="290" x2="660" y2="380"/>
    </g>
    <!-- Curved tunnel-edges (long-range, lighter) -->
    <g stroke-width="0.9" opacity="0.22" stroke-dasharray="2 4">
      <path d="M 180 120 Q 400 60 630 160"/>
      <path d="M 120 220 Q 300 480 540 400"/>
      <path d="M 540 400 Q 750 350 710 240"/>
      <path d="M 220 280 Q 380 100 500 280"/>
    </g>
  </g>

  <!-- Nodes -->
  <!-- Peer nodes (emerald, larger, with glow halo) -->
  <g>
    <g transform="translate(180,120)">
      <circle r="14" fill="url(#peerGlow)"/>
      <circle r="6" fill="#34d399"/>
    </g>
    <g transform="translate(430,160)">
      <circle r="14" fill="url(#peerGlow)"/>
      <circle r="6" fill="#34d399"/>
    </g>
    <g transform="translate(710,240)">
      <circle r="14" fill="url(#peerGlow)"/>
      <circle r="6" fill="#34d399"/>
    </g>
    <g transform="translate(280,270)">
      <circle r="14" fill="url(#peerGlow)"/>
      <circle r="6" fill="#34d399"/>
    </g>
    <g transform="translate(540,400)">
      <circle r="14" fill="url(#peerGlow)"/>
      <circle r="6" fill="#34d399"/>
    </g>
    <g transform="translate(320,430)">
      <circle r="14" fill="url(#peerGlow)"/>
      <circle r="6" fill="#34d399"/>
    </g>
  </g>

  <!-- Research / chunk nodes (warm amber, mid-size) -->
  <g fill="#d9a255">
    <circle cx="320" cy="180" r="3.6"/>
    <circle cx="120" cy="220" r="3.6"/>
    <circle cx="540" cy="200" r="3.6"/>
    <circle cx="630" cy="160" r="3.6"/>
    <circle cx="500" cy="280" r="3.6"/>
    <circle cx="610" cy="290" r="3.6"/>
    <circle cx="220" cy="280" r="3.6"/>
    <circle cx="160" cy="320" r="3.6"/>
    <circle cx="430" cy="370" r="3.6"/>
    <circle cx="660" cy="380" r="3.6"/>
  </g>

  <!-- Code / toolshed nodes (ink-mute, small) -->
  <g fill="#8c8c98">
    <circle cx="240" cy="380" r="2.4"/>
    <circle cx="340" cy="350" r="2.4"/>
    <circle cx="380" cy="280" r="2.4"/>
    <circle cx="260" cy="170" r="2.4"/>
    <circle cx="370" cy="220" r="2.4"/>
    <circle cx="450" cy="220" r="2.4"/>
    <circle cx="475" cy="320" r="2.4"/>
    <circle cx="565" cy="340" r="2.4"/>
    <circle cx="200" cy="170" r="2.4"/>
    <circle cx="100" cy="280" r="2.4"/>
    <circle cx="80"  cy="180" r="2.4"/>
    <circle cx="290" cy="100" r="2.4"/>
    <circle cx="380" cy="100" r="2.4"/>
    <circle cx="490" cy="100" r="2.4"/>
    <circle cx="600" cy="100" r="2.4"/>
    <circle cx="700" cy="160" r="2.4"/>
    <circle cx="730" cy="320" r="2.4"/>
    <circle cx="700" cy="430" r="2.4"/>
    <circle cx="600" cy="470" r="2.4"/>
    <circle cx="450" cy="450" r="2.4"/>
    <circle cx="240" cy="460" r="2.4"/>
    <circle cx="140" cy="380" r="2.4"/>
    <circle cx="80"  cy="320" r="2.4"/>
    <circle cx="80"  cy="430" r="2.4"/>
  </g>

  <!-- Optional legend -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#a4a4af">
    <g transform="translate(40,460)">
      <circle cx="0" cy="0" r="4" fill="#34d399"/>
      <text x="10" y="3">peer</text>
      <circle cx="60" cy="0" r="3.2" fill="#d9a255"/>
      <text x="70" y="3">research</text>
      <circle cx="140" cy="0" r="2.4" fill="#8c8c98"/>
      <text x="148" y="3">code chunk</text>
    </g>
  </g>
</svg>
