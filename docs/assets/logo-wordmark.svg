<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 64" width="360" height="64" role="img" aria-label="akashik">
  <title>akashik — wordmark</title>
  <desc>Recto sigil (parchment + emerald A) followed by the lowercase "akashik" wordmark set in serif. For headers, social bios, signatures.</desc>
  <defs>
    <style>
      .wm-text {
        font-family: 'Fraunces','EB Garamond','Iowan Old Style','Palatino Linotype',Georgia,serif;
        font-weight: 500;
        font-size: 32px;
        letter-spacing: -0.012em;
        fill: #1e1a14;
      }
    </style>
  </defs>

  <!-- Recto sigil — same geometry as logo-mark.svg, parked at the left -->
  <g transform="translate(0,0)">
    <rect width="64" height="64" rx="14" fill="#f3ecd8"/>

    <g stroke="#9c6f1c" stroke-width="1.4" stroke-linecap="round" opacity="0.85">
      <line x1="32" y1="0.6"  x2="32" y2="3.6"/>
      <line x1="63.4" y1="32" x2="60.4" y2="32"/>
      <line x1="32" y1="63.4" x2="32" y2="60.4"/>
      <line x1="0.6" y1="32"  x2="3.6" y2="32"/>
    </g>

    <circle cx="32" cy="32" r="29" fill="none" stroke="#9c6f1c"
            stroke-width="1" stroke-dasharray="3 2.5" opacity="0.9"/>
    <circle cx="32" cy="32" r="26" fill="none" stroke="#9c6f1c"
            stroke-width="0.45" opacity="0.35"/>

    <g fill="#1f6f4f">
      <path d="M 30.4 13 L 33.6 13 L 23.8 47 L 20 49 L 18.3 47 L 28.8 18 Z"/>
      <path d="M 30.4 13 L 33.6 13 L 44.2 47 L 45.7 49 L 41.9 49 L 35.1 25 Z"/>
      <path d="M 25.5 33 L 38.5 33 L 39.1 35.4 L 24.9 35.4 Z"/>
    </g>
    <rect x="29.2" y="12" width="5.6" height="1.6" fill="#1f6f4f"/>

    <text x="32" y="58.4" text-anchor="middle"
          font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace"
          font-size="7.2" font-weight="500" fill="#9c6f1c">§</text>
  </g>

  <!-- Wordmark — lowercase Fraunces, italic flourish on the trailing 'k'? No.
       Keep upright for header use. The italic axis is reserved for emphasis
       inside body copy (per BRAND-NARRATIVE.md voice rules). -->
  <text x="80" y="43" class="wm-text">akashik</text>
</svg>
