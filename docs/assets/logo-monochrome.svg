<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 64" width="360" height="64" role="img" aria-label="akashik">
  <title>akashik — monochrome wordmark for non-brand placements</title>
  <defs>
    <style>
      .wm-text { font-family: 'Outfit', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-weight: 700; font-size: 28px; letter-spacing: -0.02em; fill: currentColor; }
    </style>
  </defs>
  <g transform="translate(0,0)" fill="none" stroke="currentColor" stroke-linecap="round">
    <rect width="64" height="64" rx="14" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
    <g stroke-width="1.3" opacity="0.45">
      <line x1="32" y1="12" x2="14" y2="24"/>
      <line x1="32" y1="12" x2="50" y2="24"/>
      <line x1="14" y1="24" x2="14" y2="40"/>
      <line x1="50" y1="24" x2="50" y2="40"/>
      <line x1="14" y1="40" x2="32" y2="52"/>
      <line x1="50" y1="40" x2="32" y2="52"/>
      <line x1="32" y1="12" x2="32" y2="52"/>
      <line x1="14" y1="24" x2="50" y2="40"/>
      <line x1="50" y1="24" x2="14" y2="40"/>
    </g>
    <g stroke-width="1.6" fill="none">
      <circle cx="32" cy="12" r="3.6"/>
      <circle cx="14" cy="24" r="3.6"/>
      <circle cx="50" cy="24" r="3.6"/>
      <circle cx="14" cy="40" r="3.6"/>
      <circle cx="50" cy="40" r="3.6"/>
      <circle cx="32" cy="52" r="3.6"/>
    </g>
    <circle cx="32" cy="32" r="7.5" fill="currentColor" stroke="none"/>
    <circle cx="32" cy="32" r="10.5" fill="none" stroke-width="0.9" opacity="0.5"/>
  </g>
  <text x="84" y="42" class="wm-text">akashik</text>
</svg>
