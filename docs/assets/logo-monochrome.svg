<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 64" width="360" height="64" role="img" aria-label="akashik">
  <title>akashik — monochrome wordmark</title>
  <desc>Single-ink wordmark for stamps, watermarks, embossing, print, and any non-brand surface. Uses currentColor so the ink follows the host text color.</desc>
  <defs>
    <style>
      .wm-text {
        font-family: 'Fraunces','EB Garamond','Iowan Old Style','Palatino Linotype',Georgia,serif;
        font-weight: 500;
        font-size: 32px;
        letter-spacing: -0.012em;
        fill: currentColor;
      }
    </style>
  </defs>

  <!-- Recto sigil — monochrome variant -->
  <g transform="translate(0,0)" fill="none" stroke="currentColor" color="#1e1a14"
     stroke-linecap="round">

    <rect x="0.6" y="0.6" width="62.8" height="62.8" rx="13.4"
          fill="none" stroke-width="1.1"/>

    <g stroke-width="1.4">
      <line x1="32" y1="3.5"  x2="32" y2="6.5"/>
      <line x1="60.5" y1="32" x2="57.5" y2="32"/>
      <line x1="32" y1="60.5" x2="32" y2="57.5"/>
      <line x1="3.5" y1="32"  x2="6.5" y2="32"/>
    </g>

    <circle cx="32" cy="32" r="27" fill="none"
            stroke-width="1" stroke-dasharray="3 2.5"/>
    <circle cx="32" cy="32" r="24" fill="none"
            stroke-width="0.45" opacity="0.35"/>

    <!-- Illuminated A — filled with currentColor, no stroke -->
    <g fill="currentColor" stroke="none">
      <path d="M 30.4 14 L 33.6 14 L 23.8 46 L 20 48 L 18.3 46 L 28.8 19 Z"/>
      <path d="M 30.4 14 L 33.6 14 L 44.2 46 L 45.7 48 L 41.9 48 L 35.1 26 Z"/>
      <path d="M 25.5 33 L 38.5 33 L 39.1 35.4 L 24.9 35.4 Z"/>
      <rect x="29.2" y="13" width="5.6" height="1.6"/>
    </g>

    <text x="32" y="57.4" text-anchor="middle"
          font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace"
          font-size="7.2" font-weight="500" fill="currentColor"
          opacity="0.7" stroke="none">§</text>
  </g>

  <text x="80" y="43" class="wm-text">akashik</text>
</svg>
