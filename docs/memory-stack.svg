<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1020" fill="none" role="img" aria-label="Why wellinformed compounds — same Claude session, two different Fridays">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%"  stop-color="#14141f" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0c0c14" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#34d399" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#34d399" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="loopstroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#34d399" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="1020" fill="url(#bg)"/>

  <!-- ─── title ──────────────────────────────────────────── -->
  <g font-family="'Outfit','Inter','SF Pro Display',-apple-system,'Helvetica Neue',Arial,sans-serif" fill="#f7f4ec">
    <text x="700" y="60" text-anchor="middle" font-size="36" font-weight="700" letter-spacing="-1.4">The same Claude session, two different Fridays.</text>
    <text x="700" y="98" text-anchor="middle" font-size="16" font-weight="400" font-style="italic" fill="#8c8c98" letter-spacing="0.3">"how do I hybrid-search sqlite-vec with FTS5?"</text>
  </g>

  <!-- ─── column headers ────────────────────────────────── -->
  <g font-family="'JetBrains Mono','SF Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" letter-spacing="1.6">
    <text x="340" y="156" text-anchor="middle" fill="#6c6c78">TODAY</text>
    <text x="1060" y="156" text-anchor="middle" fill="#34d399">WITH WELLINFORMED</text>
  </g>

  <!-- ─── column divider ────────────────────────────────── -->
  <line x1="700" y1="130" x2="700" y2="820" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.35" stroke-dasharray="2 5"/>

  <!-- ─── LEFT COLUMN — today ─────────────────────────────── -->
  <g font-family="'Outfit','Inter',-apple-system,'Helvetica Neue',Arial,sans-serif">

    <!-- Row 1 — the ask -->
    <g>
      <circle cx="80" cy="210" r="18" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.6"/>
      <text x="80" y="216" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-size="16" font-weight="600" fill="#8c8c98">?</text>
      <text x="120" y="203" font-size="17" font-weight="600" fill="#c7c7d0">You ask Claude.</text>
      <text x="120" y="227" font-size="13" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" fill="#6c6c78">fresh session · context empty · Claude has no idea what you know</text>
    </g>

    <!-- Row 2 — Claude searches the web -->
    <g>
      <circle cx="80" cy="290" r="18" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.6"/>
      <text x="80" y="296" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-size="15" fill="#8c8c98">⧖</text>
      <text x="120" y="283" font-size="17" font-weight="600" fill="#c7c7d0">Claude browses.</text>
      <text x="120" y="307" font-size="13" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" fill="#6c6c78">10 URLs fetched · ~30 seconds · ~45k tokens burned · one at a time</text>
    </g>

    <!-- Row 3 — training cutoff staleness -->
    <g>
      <circle cx="80" cy="370" r="18" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.6"/>
      <text x="80" y="376" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-size="15" fill="#8c8c98">△</text>
      <text x="120" y="363" font-size="17" font-weight="600" fill="#c7c7d0">Answer is stale.</text>
      <text x="120" y="387" font-size="13" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" fill="#6c6c78">training cutoff 6 months old · yesterday's paper · last week's fix — absent</text>
    </g>

    <!-- Row 4 — you pay -->
    <g>
      <circle cx="80" cy="450" r="18" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.6"/>
      <text x="80" y="456" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-size="15" fill="#8c8c98">$</text>
      <text x="120" y="443" font-size="17" font-weight="600" fill="#c7c7d0">You pay.</text>
      <text x="120" y="467" font-size="13" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" fill="#6c6c78">$0.20 in Anthropic tokens · $X / mo for SaaS memory if you want state</text>
    </g>

    <!-- Row 5 — session dies -->
    <g>
      <circle cx="80" cy="530" r="18" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.6"/>
      <text x="80" y="536" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-size="15" fill="#8c8c98">×</text>
      <text x="120" y="523" font-size="17" font-weight="600" fill="#c7c7d0">Session ends. Answer dies.</text>
      <text x="120" y="547" font-size="13" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" fill="#6c6c78">closed tab · lost context · tomorrow's session starts from zero</text>
    </g>

    <!-- Row 6 — stranger -->
    <g>
      <circle cx="80" cy="610" r="18" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.6"/>
      <text x="80" y="616" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-size="15" fill="#8c8c98">↺</text>
      <text x="120" y="603" font-size="17" font-weight="600" fill="#c7c7d0">10,000 strangers repeat this.</text>
      <text x="120" y="627" font-size="13" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" fill="#6c6c78">same question · same web dive · same 45k tokens · none of it compounds</text>
    </g>

    <!-- Summary card -->
    <g transform="translate(40 720)">
      <rect x="0" y="0" width="620" height="80" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.10)"/>
      <text x="20" y="30" font-size="13" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-weight="600" fill="#6c6c78" letter-spacing="1.2">THE TOTAL</text>
      <text x="20" y="58" font-size="16" fill="#8c8c98">slow · stale · expensive · siloed · never compounds</text>
    </g>
  </g>

  <!-- ─── RIGHT COLUMN — with wellinformed ────────────────── -->
  <g font-family="'Outfit','Inter',-apple-system,'Helvetica Neue',Arial,sans-serif">

    <!-- soft emerald glow behind the right column -->
    <circle cx="1060" cy="440" r="360" fill="url(#glow)"/>

    <!-- Row 1 — the ask -->
    <g>
      <circle cx="800" cy="210" r="18" fill="none" stroke="#34d399" stroke-width="1.8"/>
      <text x="800" y="216" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-size="16" font-weight="700" fill="#34d399">?</text>
      <text x="840" y="203" font-size="17" font-weight="700" fill="#f7f4ec">You ask Claude.</text>
      <text x="840" y="227" font-size="13" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" fill="#b4b4c0">PreToolUse hook fires · `wellinformed ask` runs before Claude reaches for a tool</text>
    </g>

    <!-- Row 2 — graph replies -->
    <g>
      <circle cx="800" cy="290" r="18" fill="#34d399" stroke="#34d399" stroke-width="1.8"/>
      <text x="800" y="296" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-size="14" font-weight="700" fill="#0c0c14">✓</text>
      <text x="840" y="283" font-size="17" font-weight="700" fill="#f7f4ec">Graph answers in 11 ms.</text>
      <text x="840" y="307" font-size="13" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" fill="#b4b4c0">3 hits · GitHub repo someone starred · community code · arxiv paper from 2h ago</text>
    </g>

    <!-- Row 3 — fresh -->
    <g>
      <circle cx="800" cy="370" r="18" fill="#34d399" stroke="#34d399" stroke-width="1.8"/>
      <text x="800" y="377" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-size="14" font-weight="700" fill="#0c0c14">∞</text>
      <text x="840" y="363" font-size="17" font-weight="700" fill="#f7f4ec">Answer is live.</text>
      <text x="840" y="387" font-size="13" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" fill="#b4b4c0">yesterday's paper · last night's fix · whatever the community has seen by now</text>
    </g>

    <!-- Row 4 — no pay -->
    <g>
      <circle cx="800" cy="450" r="18" fill="#34d399" stroke="#34d399" stroke-width="1.8"/>
      <text x="800" y="456" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-size="13" font-weight="700" fill="#0c0c14">$0</text>
      <text x="840" y="443" font-size="17" font-weight="700" fill="#f7f4ec">$0 in marginal cost.</text>
      <text x="840" y="467" font-size="13" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" fill="#b4b4c0">no SaaS seat · no vendor · ~5k tokens vs 45k · local CPU · MIT</text>
    </g>

    <!-- Row 5 — session indexed back -->
    <g>
      <circle cx="800" cy="530" r="18" fill="#34d399" stroke="#34d399" stroke-width="1.8"/>
      <text x="800" y="536" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-size="14" font-weight="700" fill="#0c0c14">+</text>
      <text x="840" y="523" font-size="17" font-weight="700" fill="#f7f4ec">Session ends. Graph grows.</text>
      <text x="840" y="547" font-size="13" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" fill="#b4b4c0">your transcript vector-indexed · next session starts richer than this one</text>
    </g>

    <!-- Row 6 — community loop -->
    <g>
      <circle cx="800" cy="610" r="18" fill="#34d399" stroke="#34d399" stroke-width="1.8"/>
      <text x="800" y="616" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-size="14" font-weight="700" fill="#0c0c14">◉</text>
      <text x="840" y="603" font-size="17" font-weight="700" fill="#f7f4ec">Everyone else compounds too.</text>
      <text x="840" y="627" font-size="13" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" fill="#b4b4c0">every peer indexes their shards · the 10,000-stranger loop runs once, not 10,000 times</text>
    </g>

    <!-- Summary card -->
    <g transform="translate(760 720)">
      <rect x="0" y="0" width="600" height="80" rx="10" fill="rgba(52,211,153,0.12)" stroke="#34d399" stroke-width="1.6"/>
      <text x="20" y="30" font-size="13" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-weight="700" fill="#34d399" letter-spacing="1.2">THE TOTAL</text>
      <text x="20" y="58" font-size="16" fill="#f7f4ec" font-weight="600">instant · fresh · free · shared · compounds every single day</text>
    </g>
  </g>

  <!-- ─── bottom tagline ─────────────────────────────────── -->
  <g transform="translate(700 900)" font-family="'Outfit','Inter',-apple-system,sans-serif">
    <text text-anchor="middle" x="0" y="0" font-size="26" font-weight="700" fill="#f7f4ec" letter-spacing="-0.5">
      The only knowledge layer that gets <tspan fill="#34d399" font-style="italic">richer</tspan> the more people use it.
    </text>
    <text text-anchor="middle" x="0" y="38" font-size="14" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" fill="#8c8c98" letter-spacing="0.5">
      accumulate · share · stream — peer-to-peer, W3C did:key, libp2p, MIT
    </text>
  </g>
</svg>
