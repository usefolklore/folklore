<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" fill="none" role="img" aria-label="folklore — the network before the web">
  <!-- background: ink-900 from the site token palette -->
  <rect width="960" height="240" rx="0" fill="#0c0c14"/>

  <!-- radial corona behind the mark -->
  <defs>
    <radialGradient id="corona" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#34d399" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="140" cy="120" r="96" fill="url(#corona)"/>

  <!-- 6-peer mesh mark + bright central core ('you') -->
  <g transform="translate(140 120)">
    <g stroke="#34d399" stroke-width="1.8" stroke-linecap="round" opacity="0.55" fill="none">
      <line x1="0"   y1="-60" x2="-52" y2="-18"/>
      <line x1="0"   y1="-60" x2="52"  y2="-18"/>
      <line x1="-52" y1="-18" x2="-52" y2="42"/>
      <line x1="52"  y1="-18" x2="52"  y2="42"/>
      <line x1="-52" y1="42"  x2="0"   y2="72"/>
      <line x1="52"  y1="42"  x2="0"   y2="72"/>
      <line x1="0"   y1="-60" x2="0"   y2="72"/>
      <line x1="-52" y1="-18" x2="52"  y2="42"/>
      <line x1="52"  y1="-18" x2="-52" y2="42"/>
    </g>
    <g fill="#0c0c14" stroke="#34d399" stroke-width="2.4">
      <circle cx="0"   cy="-60" r="6"/>
      <circle cx="-52" cy="-18" r="6"/>
      <circle cx="52"  cy="-18" r="6"/>
      <circle cx="-52" cy="42"  r="6"/>
      <circle cx="52"  cy="42"  r="6"/>
      <circle cx="0"   cy="72"  r="6"/>
    </g>
    <circle r="16" fill="#34d399"/>
    <circle r="22" fill="none" stroke="#34d399" stroke-width="1.4" opacity="0.55"/>
  </g>

  <!-- wordmark -->
  <text x="288" y="138"
        font-family="'Outfit', 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="76" font-weight="700"
        fill="#f7f4ec" letter-spacing="-2.4">folklore</text>

  <!-- tagline -->
  <text x="290" y="176"
        font-family="'Outfit', 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="20" font-weight="400" font-style="italic"
        fill="#8c8c98" letter-spacing="0.4">the network before the web.</text>

  <!-- hairline accent -->
  <line x1="290" y1="198" x2="370" y2="198" stroke="#34d399" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
</svg>
