<svg width="256" height="256" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Folklore — mouth to ear">
  <!-- Concept 2: Mouth to Ear.
       A bold spoken arc carries a spark (spoken word, top-left) down into a clear
       ear (bottom-right): told once, received and kept. Heavier strokes and a
       distinct ear silhouette so it doesn't read as a generic refresh swirl. -->
  <!-- the travelling arc: from mouth (spark) sweeping to the ear -->
  <path d="M16 18C8 34 14 50 30 52" fill="none" stroke="#1d1813" stroke-width="4.5"
        stroke-linecap="round"/>
  <!-- arrowhead landing at the ear -->
  <path d="M30 52l-9-3 4-7z" fill="#1d1813"/>
  <!-- the ear: knowledge received & held -->
  <path d="M40 22a13 13 0 0 1 7 24c-3 2-3 6-7 6a6 6 0 0 1-6-6c0-3 2-4 2-7"
        fill="#f4ecd8" stroke="#1d1813" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- inner whorl of the ear -->
  <path d="M41 30a5 5 0 0 1 3 9" fill="none" stroke="#ff4f6d" stroke-width="3.5"
        stroke-linecap="round"/>
  <!-- the spoken spark leaving the mouth -->
  <path d="M16 18l2-7 2 7 7 2-7 2-2 7-2-7-7-2z" fill="#f5b921" stroke="#1d1813"
        stroke-width="2.2" stroke-linejoin="round"/>
</svg>
